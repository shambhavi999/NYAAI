services:
  - type: web
    name: nyaai
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn nyaai.wsgi:application
    envVars:
      - key: DEBUG
        value: false
      - key: GROQ_API_KEY
        sync: false