<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Profile — NYAAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --ease: cubic-bezier(0.16,1,0.3,1);
      --bg:        #07060f;
      --bg-2:      #0d0b1a;
      --bg-3:      #120f22;
      --surface:   rgba(255,255,255,0.04);
      --surface-2: rgba(255,255,255,0.07);
      --border:    rgba(255,255,255,0.08);
      --border-2:  rgba(255,255,255,0.14);
      --text:      #f0eeff;
      --text-2:    #a09db8;
      --text-3:    #635f7a;
      --accent:    #7c3aed;
      --accent-2:  #9f67ff;
      --accent-g:  rgba(124,58,237,0.3);
      --green:     #34d399;
      --green-g:   rgba(52,211,153,0.15);
      --gold:      #fbbf24;
      --red:       #f87171;
      --sidebar-w: 260px;
    }
    [data-theme="light"] {
      --bg:        #faf9ff;
      --bg-2:      #f3f1ff;
      --bg-3:      #ede9ff;
      --surface:   rgba(109,40,217,0.05);
      --surface-2: rgba(109,40,217,0.09);
      --border:    rgba(109,40,217,0.12);
      --border-2:  rgba(109,40,217,0.22);
      --text:      #1a1530;
      --text-2:    #4a4568;
      --text-3:    #8b87a8;
      --accent:    #6d28d9;
      --accent-2:  #7c3aed;
      --accent-g:  rgba(109,40,217,0.18);
      --green:     #059669;
      --green-g:   rgba(5,150,105,0.1);
      --gold:      #d97706;
      --red:       #dc2626;
    }

    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      background:var(--bg);color:var(--text);
      font-family:'Geist',system-ui,sans-serif;
      font-weight:400;line-height:1.6;overflow-x:hidden;
      transition:background 0.4s var(--ease),color 0.4s var(--ease);
    }

    /* ── SIDEBAR ── */
    .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);z-index:100;background:var(--bg-2);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:transform 0.35s var(--ease),background 0.4s}
    .sidebar-logo{padding:1.5rem 1.5rem 1rem;border-bottom:1px solid var(--border)}
    .logo{font-family:'Instrument Serif',serif;font-size:1.6rem;font-weight:400;color:var(--text);text-decoration:none;letter-spacing:-0.01em}
    .logo b{color:var(--accent);font-weight:400}
    .logo-sub{font-size:0.7rem;color:var(--text-3);margin-top:0.1rem;letter-spacing:0.03em}
    .sidebar-nav{flex:1;padding:1rem 0.75rem;overflow-y:auto}
    .nav-section{margin-bottom:1.75rem}
    .nav-section-label{font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3);font-weight:600;padding:0 0.75rem;margin-bottom:0.5rem}
    .nav-item{display:flex;align-items:center;gap:0.75rem;padding:0.6rem 0.75rem;border-radius:10px;color:var(--text-2);text-decoration:none;font-size:0.875rem;cursor:pointer;transition:all 0.2s;border:1px solid transparent;background:none;width:100%;text-align:left;font-family:'Geist',sans-serif}
    .nav-item:hover{color:var(--text);background:var(--surface)}
    .nav-item.active{color:var(--text);background:var(--surface-2);border-color:var(--border-2)}
    .nav-item.active .nav-ic{color:var(--accent)}
    .nav-ic{font-size:1rem;flex-shrink:0;width:20px;text-align:center}
    .sidebar-bottom{padding:1rem 0.75rem;border-top:1px solid var(--border)}
    .user-card{display:flex;align-items:center;gap:0.75rem;padding:0.75rem;border-radius:12px;background:var(--surface);border:1px solid var(--border)}
    .user-avatar-sm{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;font-size:0.875rem;font-weight:600;color:#fff}
    .user-name{font-size:0.825rem;font-weight:500}
    .user-role{font-size:0.7rem;color:var(--text-3)}

    /* ── MAIN ── */
    .main{margin-left:var(--sidebar-w);min-height:100vh;transition:margin-left 0.35s var(--ease)}

    /* ── TOPBAR ── */
    .topbar{position:sticky;top:0;z-index:50;background:color-mix(in srgb,var(--bg) 85%,transparent);backdrop-filter:blur(24px) saturate(180%);border-bottom:1px solid var(--border);padding:0.875rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
    .topbar-left{display:flex;align-items:center;gap:1rem}
    .back-btn{display:flex;align-items:center;gap:0.5rem;padding:0.45rem 1rem;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);font-size:0.825rem;cursor:pointer;font-family:'Geist',sans-serif;transition:all 0.2s;text-decoration:none}
    .back-btn:hover{border-color:var(--border-2);color:var(--text)}
    .topbar-title{font-family:'Instrument Serif',serif;font-size:1.4rem;font-weight:400;letter-spacing:-0.01em}
    .topbar-right{display:flex;align-items:center;gap:0.75rem}
    .theme-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);font-size:0.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
    .theme-btn:hover{border-color:var(--border-2);color:var(--text)}
    .menu-btn{display:none;background:none;border:1px solid var(--border);color:var(--text);padding:0.5rem;border-radius:8px;cursor:pointer;font-size:1.1rem}

    /* ── CONTENT ── */
    .content{padding:2rem;max-width:900px}

    /* ── LOADING ── */
    .loading-state{display:flex;align-items:center;justify-content:center;padding:6rem;gap:0.75rem;color:var(--text-3);font-size:0.875rem}
    .spin{width:20px;height:20px;border-radius:50%;border:2px solid var(--border-2);border-top-color:var(--accent);animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── PROFILE HERO ── */
    .profile-hero{
      background:var(--surface);border:1px solid var(--border);
      border-radius:20px;padding:2rem;margin-bottom:1.5rem;
      position:relative;overflow:hidden;
      animation:fadeUp 0.5s var(--ease) both;
    }
    .profile-hero::before{
      content:'';position:absolute;top:0;left:0;right:0;height:3px;
      background:linear-gradient(90deg,var(--accent),var(--accent-2),transparent);
    }
    .profile-hero-inner{display:flex;align-items:center;gap:1.75rem;flex-wrap:wrap}
    .avatar-wrap{position:relative;flex-shrink:0}
    .avatar-circle{
      width:80px;height:80px;border-radius:50%;
      background:linear-gradient(135deg,var(--accent),var(--accent-2));
      display:flex;align-items:center;justify-content:center;
      font-size:2rem;font-weight:600;color:#fff;
      border:3px solid var(--border-2);
    }
    .avatar-badge{
      position:absolute;bottom:2px;right:2px;
      width:20px;height:20px;border-radius:50%;
      background:var(--green);border:2px solid var(--bg-2);
      display:flex;align-items:center;justify-content:center;
      font-size:0.55rem;
    }
    .hero-info{flex:1;min-width:200px}
    .hero-name{font-family:'Instrument Serif',serif;font-size:1.75rem;line-height:1.2;margin-bottom:0.3rem}
    .hero-email{font-size:0.875rem;color:var(--text-3);margin-bottom:0.75rem}
    .hero-badges{display:flex;gap:0.5rem;flex-wrap:wrap}
    .hero-badge{
      font-size:0.7rem;font-weight:500;padding:0.25rem 0.75rem;
      border-radius:100px;letter-spacing:0.02em;
    }
    .hero-badge.member{background:rgba(124,58,237,0.12);color:var(--accent-2);border:1px solid rgba(124,58,237,0.2)}
    .hero-badge.state{background:var(--surface-2);color:var(--text-2);border:1px solid var(--border-2)}
    .hero-badge.lang{background:rgba(251,191,36,0.1);color:var(--gold);border:1px solid rgba(251,191,36,0.2)}

    /* ── STAT CHIPS ── */
    .hero-stats{display:flex;gap:1.5rem;margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid var(--border);flex-wrap:wrap}
    .hero-stat{display:flex;flex-direction:column;gap:0.15rem}
    .hero-stat-num{font-family:'Instrument Serif',serif;font-size:1.5rem;line-height:1}
    .hero-stat-label{font-size:0.72rem;color:var(--text-3)}

    /* ── PANEL ── */
    .panel{background:var(--surface);border:1px solid var(--border);border-radius:18px;overflow:hidden;margin-bottom:1.5rem;animation:fadeUp 0.5s var(--ease) both}
    .panel:nth-child(2){animation-delay:0.07s}
    .panel:nth-child(3){animation-delay:0.14s}
    .panel-head{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 1.5rem;border-bottom:1px solid var(--border)}
    .panel-title{font-size:0.95rem;font-weight:600}
    .panel-sub{font-size:0.75rem;color:var(--text-3);margin-top:0.1rem}
    .panel-body{padding:1.5rem}

    /* ── FORM ── */
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    .form-grid.full{grid-template-columns:1fr}
    .fg{display:flex;flex-direction:column;gap:0.35rem}
    .fg label{font-size:0.75rem;color:var(--text-2);font-weight:500}
    .fg input,.fg select{
      padding:0.7rem 0.9rem;
      background:var(--bg-2);border:1px solid var(--border);
      border-radius:10px;color:var(--text);font-size:0.875rem;
      font-family:'Geist',sans-serif;outline:none;
      transition:border-color 0.25s,box-shadow 0.25s;
    }
    .fg input:focus,.fg select:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(124,58,237,0.12);
    }
    .fg input::placeholder{color:var(--text-3)}
    .fg input:read-only{
      background:var(--surface);
      color:var(--text-3);cursor:not-allowed;
    }
    .fg select option{background:var(--bg-2);color:var(--text)}
    .fg-hint{font-size:0.7rem;color:var(--text-3)}

    /* ── BUTTONS ── */
    .btn-primary{display:inline-flex;align-items:center;gap:0.5rem;background:var(--accent);color:#fff;border:none;padding:0.65rem 1.5rem;border-radius:10px;font-size:0.875rem;font-weight:500;cursor:pointer;font-family:'Geist',sans-serif;transition:all 0.25s;box-shadow:0 4px 16px var(--accent-g)}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 28px var(--accent-g)}
    .btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none}
    .btn-secondary{display:inline-flex;align-items:center;gap:0.5rem;background:var(--surface);color:var(--text-2);border:1px solid var(--border);padding:0.65rem 1.5rem;border-radius:10px;font-size:0.875rem;font-weight:500;cursor:pointer;font-family:'Geist',sans-serif;transition:all 0.2s}
    .btn-secondary:hover{border-color:var(--border-2);color:var(--text)}
    .btn-danger{display:inline-flex;align-items:center;gap:0.5rem;background:rgba(248,113,113,0.08);color:var(--red);border:1px solid rgba(248,113,113,0.2);padding:0.65rem 1.5rem;border-radius:10px;font-size:0.875rem;font-weight:500;cursor:pointer;font-family:'Geist',sans-serif;transition:all 0.2s}
    .btn-danger:hover{background:rgba(248,113,113,0.15);border-color:rgba(248,113,113,0.35)}

    .form-actions{display:flex;gap:0.75rem;margin-top:1.25rem;flex-wrap:wrap}

    /* ── SUCCESS / ERROR MSG ── */
    .form-msg{padding:0.7rem 1rem;border-radius:10px;font-size:0.825rem;margin-top:1rem;display:none}
    .form-msg.ok{background:rgba(52,211,153,0.1);color:var(--green);border:1px solid rgba(52,211,153,0.2);display:block}
    .form-msg.er{background:rgba(248,113,113,0.1);color:var(--red);border:1px solid rgba(248,113,113,0.2);display:block}

    /* ── DANGER ZONE ── */
    .danger-zone{
      background:rgba(248,113,113,0.04);
      border:1px solid rgba(248,113,113,0.15);
      border-radius:18px;padding:1.5rem;
      margin-bottom:1.5rem;
      animation:fadeUp 0.5s var(--ease) 0.21s both;
    }
    .danger-title{font-size:0.95rem;font-weight:600;color:var(--red);margin-bottom:0.35rem}
    .danger-sub{font-size:0.825rem;color:var(--text-3);margin-bottom:1.25rem}

    /* ── JOINED DATE ── */
    .joined-row{display:flex;align-items:center;gap:0.5rem;font-size:0.8rem;color:var(--text-3);margin-top:0.5rem}

    /* ── TOAST ── */
    .toast{position:fixed;bottom:2rem;right:2rem;z-index:999;padding:0.75rem 1.25rem;border-radius:12px;font-size:0.85rem;font-weight:500;opacity:0;transform:translateY(12px);transition:all 0.3s var(--ease);pointer-events:none;max-width:320px}
    .toast.show{opacity:1;transform:translateY(0)}
    .toast.success{background:rgba(52,211,153,0.15);color:var(--green);border:1px solid rgba(52,211,153,0.3)}
    .toast.error{background:rgba(248,113,113,0.15);color:var(--red);border:1px solid rgba(248,113,113,0.3)}
    .toast.info{background:rgba(124,58,237,0.15);color:var(--accent-2);border:1px solid rgba(124,58,237,0.3)}

    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

    @media(max-width:900px){
      .sidebar{transform:translateX(-100%)}
      .sidebar.open{transform:translateX(0)}
      .main{margin-left:0}
      .menu-btn{display:flex}
      .form-grid{grid-template-columns:1fr}
    }
    @media(max-width:600px){
      .content{padding:1rem}
      .hero-name{font-size:1.35rem}
      .profile-hero-inner{gap:1.25rem}
    }
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <a href="/" class="logo">NY<b>AA</b>I</a>
    <div class="logo-sub">Justice for Every Indian</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">
      <div class="nav-section-label">Main</div>
      <a class="nav-item" href="/dashboard/"><span class="nav-ic">🏠</span> Dashboard</a>
      <a class="nav-item" href="/dashboard/"><span class="nav-ic">⚖️</span> New Case</a>
      <a class="nav-item" href="/dashboard/"><span class="nav-ic">📋</span> My Cases</a>
      <a class="nav-item" href="/dashboard/"><span class="nav-ic">📄</span> Legal Notices</a>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Resources</div>
      <button class="nav-item"><span class="nav-ic">📚</span> Indian Laws</button>
      <button class="nav-item"><span class="nav-ic">🏛️</span> Find Forum</button>
      <button class="nav-item"><span class="nav-ic">❓</span> How to Use</button>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Account</div>
      <button class="nav-item active"><span class="nav-ic">👤</span> Profile</button>
      <button class="nav-item" onclick="doLogout()"><span class="nav-ic">🚪</span> Sign Out</button>
    </div>
  </nav>
  <div class="sidebar-bottom">
    <div class="user-card">
      <div class="user-avatar-sm" id="sidebar-avatar">?</div>
      <div>
        <div class="user-name" id="sidebar-name">Loading...</div>
        <div class="user-role">NYAAI Member</div>
      </div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
      <a class="back-btn" href="/dashboard/">← Dashboard</a>
      <div class="topbar-title">My Profile</div>
    </div>
    <div class="topbar-right">
      <button class="theme-btn" id="themeBtn">🌙</button>
    </div>
  </div>

  <div class="content" id="main-content">
    <div class="loading-state"><div class="spin"></div> Loading profile...</div>
  </div>
</main>

<script>
  // ── THEME ──
  const html = document.documentElement;
  const tBtn = document.getElementById('themeBtn');
  const savedTheme = localStorage.getItem('nyaai-theme') || 'dark';
  applyTheme(savedTheme);
  function applyTheme(t) {
    html.setAttribute('data-theme', t);
    tBtn.textContent = t === 'dark' ? '☀️' : '🌙';
    localStorage.setItem('nyaai-theme', t);
  }
  tBtn.addEventListener('click', () => applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

  // ── AUTH ──
  const token = localStorage.getItem('access_token');
  const user  = JSON.parse(localStorage.getItem('user') || '{}');
  if (!token) { window.location.href = '/'; }
  else {
    const name = user.name || user.username || 'User';
    document.getElementById('sidebar-name').textContent = name;
    document.getElementById('sidebar-avatar').textContent = name.charAt(0).toUpperCase();
  }

  // ── TOAST ──
  let toastTimer;
  function showToast(msg, type = 'info') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
  }

  // ── INDIAN STATES ──
  const STATES = [
    ['', 'Select state...'],
    ['AP','Andhra Pradesh'],['AR','Arunachal Pradesh'],['AS','Assam'],
    ['BR','Bihar'],['CG','Chhattisgarh'],['GA','Goa'],['GJ','Gujarat'],
    ['HR','Haryana'],['HP','Himachal Pradesh'],['JK','Jammu & Kashmir'],
    ['JH','Jharkhand'],['KA','Karnataka'],['KL','Kerala'],['MP','Madhya Pradesh'],
    ['MH','Maharashtra'],['MN','Manipur'],['ML','Meghalaya'],['MZ','Mizoram'],
    ['NL','Nagaland'],['OD','Odisha'],['PB','Punjab'],['RJ','Rajasthan'],
    ['SK','Sikkim'],['TN','Tamil Nadu'],['TS','Telangana'],['TR','Tripura'],
    ['UP','Uttar Pradesh'],['UK','Uttarakhand'],['WB','West Bengal'],
    ['DL','Delhi'],['PY','Puducherry'],['CH','Chandigarh'],
  ];

  const LANGUAGES = [
    ['en','English'],['hi','Hindi'],['ta','Tamil'],
    ['te','Telugu'],['bn','Bengali'],['mr','Marathi'],
    ['gu','Gujarati'],['kn','Kannada'],['ml','Malayalam'],
    ['pa','Punjabi'],
  ];

  function stateOptions(selected) {
    return STATES.map(([v,l]) =>
      `<option value="${v}" ${v === selected ? 'selected' : ''}>${l}</option>`
    ).join('');
  }

  function langOptions(selected) {
    return LANGUAGES.map(([v,l]) =>
      `<option value="${v}" ${v === selected ? 'selected' : ''}>${l}</option>`
    ).join('');
  }

  function formatJoined(d) {
    return new Date(d).toLocaleDateString('en-IN', {day:'numeric', month:'long', year:'numeric'});
  }

  // ── LOAD PROFILE ──
  let profileData = null;

  async function loadProfile() {
    try {
      const res = await fetch('/api/auth/profile/', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const d = await res.json();
      if (d.success) {
        profileData = d.profile;
        renderProfile(profileData);
      } else {
        showError('Could not load profile.');
      }
    } catch(e) {
      showError('Could not connect to server.');
    }
  }

  function showError(msg) {
    document.getElementById('main-content').innerHTML = `
      <div class="loading-state" style="flex-direction:column;gap:1rem">
        <div style="font-size:2rem">⚠️</div>
        <div>${msg} <a href="/dashboard/" style="color:var(--accent)">Go back</a></div>
      </div>`;
  }

  function renderProfile(p) {
    const initials = ((p.first_name || '')[0] || (p.username || '')[0] || '?').toUpperCase();
    const statLabel = STATES.find(s => s[0] === p.state)?.[1] || p.state || 'Not set';
    const langLabel = LANGUAGES.find(l => l[0] === p.preferred_language)?.[1] || 'English';

    // Load stats
    const totalCases = p.total_cases || 0;

    document.getElementById('main-content').innerHTML = `

      <!-- PROFILE HERO -->
      <div class="profile-hero">
        <div class="profile-hero-inner">
          <div class="avatar-wrap">
            <div class="avatar-circle">${initials}</div>
            <div class="avatar-badge">✓</div>
          </div>
          <div style="flex:1;min-width:200px">
            <div class="hero-name">${p.full_name || p.username}</div>
            <div class="hero-email">@${p.username} · ${p.email}</div>
            <div class="hero-badges">
              <span class="hero-badge member">⚖️ NYAAI Member</span>
              ${p.state ? `<span class="hero-badge state">📍 ${statLabel}</span>` : ''}
              <span class="hero-badge lang">🌐 ${langLabel}</span>
            </div>
            <div class="hero-stats">
              <div class="hero-stat">
                <div class="hero-stat-num">${totalCases}</div>
                <div class="hero-stat-label">Total Cases</div>
              </div>
              <div class="hero-stat">
                <div class="hero-stat-num">${p.joined ? formatJoined(p.joined).split(' ')[2] : '—'}</div>
                <div class="hero-stat-label">Member Since</div>
              </div>
              <div class="hero-stat">
                <div class="hero-stat-num">${langLabel}</div>
                <div class="hero-stat-label">Preferred Language</div>
              </div>
            </div>
          </div>
        </div>
        ${p.joined ? `<div class="joined-row">📅 Joined NYAAI on ${formatJoined(p.joined)}</div>` : ''}
      </div>

      <!-- PERSONAL DETAILS -->
      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">Personal Details</div>
            <div class="panel-sub">Update your name and contact information</div>
          </div>
        </div>
        <div class="panel-body">
          <div class="form-grid">
            <div class="fg">
              <label>First Name</label>
              <input id="p-first" type="text" value="${p.first_name || ''}" placeholder="Your first name"/>
            </div>
            <div class="fg">
              <label>Last Name</label>
              <input id="p-last" type="text" value="${p.last_name || ''}" placeholder="Your last name"/>
            </div>
            <div class="fg">
              <label>Email Address</label>
              <input type="email" value="${p.email || ''}" readonly/>
              <span class="fg-hint">Email cannot be changed</span>
            </div>
            <div class="fg">
              <label>Phone Number</label>
              <input id="p-phone" type="tel" value="${p.phone || ''}" placeholder="+91 98765 43210"/>
            </div>
          </div>
          <div class="form-actions">
            <button class="btn-primary" onclick="savePersonal()" id="save-personal-btn">💾 Save Changes</button>
            <button class="btn-secondary" onclick="loadProfile()">↺ Reset</button>
          </div>
          <div class="form-msg" id="personal-msg"></div>
        </div>
      </div>

      <!-- PREFERENCES -->
      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">Preferences</div>
            <div class="panel-sub">Set your state and preferred language for legal notices</div>
          </div>
        </div>
        <div class="panel-body">
          <div class="form-grid">
            <div class="fg">
              <label>State / UT</label>
              <select id="p-state">
                ${stateOptions(p.state || '')}
              </select>
              <span class="fg-hint">Used to recommend the right consumer forum</span>
            </div>
            <div class="fg">
              <label>Preferred Language</label>
              <select id="p-lang">
                ${langOptions(p.preferred_language || 'en')}
              </select>
              <span class="fg-hint">Language for your legal notices</span>
            </div>
          </div>
          <div class="form-actions">
            <button class="btn-primary" onclick="savePreferences()" id="save-pref-btn">💾 Save Preferences</button>
          </div>
          <div class="form-msg" id="pref-msg"></div>
        </div>
      </div>

      <!-- ACCOUNT INFO -->
      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">Account Information</div>
            <div class="panel-sub">Read-only account details</div>
          </div>
        </div>
        <div class="panel-body">
          <div class="form-grid">
            <div class="fg">
              <label>Username</label>
              <input type="text" value="${p.username || ''}" readonly/>
            </div>
            <div class="fg">
              <label>Member Since</label>
              <input type="text" value="${p.joined ? formatJoined(p.joined) : 'Unknown'}" readonly/>
            </div>
            <div class="fg">
              <label>Total Cases Filed</label>
              <input type="text" value="${totalCases} case${totalCases !== 1 ? 's' : ''}" readonly/>
            </div>
            <div class="fg">
              <label>Account Status</label>
              <input type="text" value="✅ Active — NYAAI Member" readonly/>
            </div>
          </div>
        </div>
      </div>

      <!-- DANGER ZONE -->
      <div class="danger-zone">
        <div class="danger-title">⚠️ Sign Out</div>
        <div class="danger-sub">Sign out from your NYAAI account on this device. Your cases and data will be saved.</div>
        <button class="btn-danger" onclick="doLogout()">🚪 Sign Out</button>
      </div>
    `;
  }

  // ── SAVE PERSONAL DETAILS ──
  async function savePersonal() {
    const btn = document.getElementById('save-personal-btn');
    const msg = document.getElementById('personal-msg');
    btn.disabled = true;
    btn.textContent = '⏳ Saving...';
    msg.className = 'form-msg';

    try {
      const res = await fetch('/api/auth/profile/', {
        method: 'PUT',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          first_name: document.getElementById('p-first').value.trim(),
          last_name:  document.getElementById('p-last').value.trim(),
          phone:      document.getElementById('p-phone').value.trim(),
        }),
      });
      const d = await res.json();
      if (d.success) {
        msg.textContent = '✅ Personal details saved successfully!';
        msg.className = 'form-msg ok';
        showToast('✅ Profile updated!', 'success');
        // Update sidebar name
        const newName = `${document.getElementById('p-first').value.trim()} ${document.getElementById('p-last').value.trim()}`.trim();
        if (newName) {
          document.getElementById('sidebar-name').textContent = newName;
          document.getElementById('sidebar-avatar').textContent = newName.charAt(0).toUpperCase();
        }
      } else {
        msg.textContent = '❌ ' + (d.message || 'Could not save. Try again.');
        msg.className = 'form-msg er';
      }
    } catch(e) {
      msg.textContent = '❌ Could not connect to server.';
      msg.className = 'form-msg er';
    }
    btn.disabled = false;
    btn.textContent = '💾 Save Changes';
  }

  // ── SAVE PREFERENCES ──
  async function savePreferences() {
    const btn = document.getElementById('save-pref-btn');
    const msg = document.getElementById('pref-msg');
    btn.disabled = true;
    btn.textContent = '⏳ Saving...';
    msg.className = 'form-msg';

    try {
      const res = await fetch('/api/auth/profile/', {
        method: 'PUT',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          state:              document.getElementById('p-state').value,
          preferred_language: document.getElementById('p-lang').value,
        }),
      });
      const d = await res.json();
      if (d.success) {
        msg.textContent = '✅ Preferences saved successfully!';
        msg.className = 'form-msg ok';
        showToast('✅ Preferences updated!', 'success');
      } else {
        msg.textContent = '❌ ' + (d.message || 'Could not save. Try again.');
        msg.className = 'form-msg er';
      }
    } catch(e) {
      msg.textContent = '❌ Could not connect to server.';
      msg.className = 'form-msg er';
    }
    btn.disabled = false;
    btn.textContent = '💾 Save Preferences';
  }

  // ── LOGOUT ──
  function doLogout() {
    const refresh = localStorage.getItem('refresh_token');
    if (refresh) {
      fetch('/api/auth/logout/', {
        method: 'POST',
        headers: {'Content-Type':'application/json','Authorization':'Bearer '+token},
        body: JSON.stringify({refresh})
      }).catch(()=>{});
    }
    localStorage.clear();
    window.location.href = '/';
  }

  // ── INIT ──
  loadProfile();
</script>
</body>
</html>
