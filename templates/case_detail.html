<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Case Detail — NYAAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --ease: cubic-bezier(0.16,1,0.3,1);
      --bg:        #07060f;
      --bg-2:      #0d0b1a;
      --bg-3:      #120f22;
      --surface:   rgba(255,255,255,0.04);
      --surface-2: rgba(255,255,255,0.07);
      --border:    rgba(255,255,255,0.08);
      --border-2:  rgba(255,255,255,0.14);
      --text:      #f0eeff;
      --text-2:    #a09db8;
      --text-3:    #635f7a;
      --accent:    #7c3aed;
      --accent-2:  #9f67ff;
      --accent-g:  rgba(124,58,237,0.3);
      --green:     #34d399;
      --green-g:   rgba(52,211,153,0.15);
      --gold:      #fbbf24;
      --red:       #f87171;
      --red-g:     rgba(248,113,113,0.15);
      --sidebar-w: 260px;
      --shadow-sm: 0 4px 24px rgba(0,0,0,0.25);
    }
    [data-theme="light"] {
      --bg:        #faf9ff;
      --bg-2:      #f3f1ff;
      --bg-3:      #ede9ff;
      --surface:   rgba(109,40,217,0.05);
      --surface-2: rgba(109,40,217,0.09);
      --border:    rgba(109,40,217,0.12);
      --border-2:  rgba(109,40,217,0.22);
      --text:      #1a1530;
      --text-2:    #4a4568;
      --text-3:    #8b87a8;
      --accent:    #6d28d9;
      --accent-2:  #7c3aed;
      --accent-g:  rgba(109,40,217,0.18);
      --green:     #059669;
      --green-g:   rgba(5,150,105,0.1);
      --gold:      #d97706;
      --red:       #dc2626;
      --red-g:     rgba(220,38,38,0.1);
      --shadow-sm: 0 4px 24px rgba(109,40,217,0.07);
    }

    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      background:var(--bg);color:var(--text);
      font-family:'Geist',system-ui,sans-serif;
      font-weight:400;line-height:1.6;overflow-x:hidden;
      transition:background 0.4s var(--ease),color 0.4s var(--ease);
    }

    /* ── SIDEBAR ── */
    .sidebar{
      position:fixed;top:0;left:0;bottom:0;
      width:var(--sidebar-w);z-index:100;
      background:var(--bg-2);border-right:1px solid var(--border);
      display:flex;flex-direction:column;
      transition:transform 0.35s var(--ease),background 0.4s;
    }
    .sidebar-logo{padding:1.5rem 1.5rem 1rem;border-bottom:1px solid var(--border)}
    .logo{font-family:'Instrument Serif',serif;font-size:1.6rem;font-weight:400;color:var(--text);text-decoration:none;letter-spacing:-0.01em}
    .logo b{color:var(--accent);font-weight:400}
    .logo-sub{font-size:0.7rem;color:var(--text-3);margin-top:0.1rem;letter-spacing:0.03em}
    .sidebar-nav{flex:1;padding:1rem 0.75rem;overflow-y:auto}
    .nav-section{margin-bottom:1.75rem}
    .nav-section-label{font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3);font-weight:600;padding:0 0.75rem;margin-bottom:0.5rem}
    .nav-item{
      display:flex;align-items:center;gap:0.75rem;
      padding:0.6rem 0.75rem;border-radius:10px;
      color:var(--text-2);text-decoration:none;
      font-size:0.875rem;cursor:pointer;
      transition:all 0.2s;border:1px solid transparent;
      background:none;width:100%;text-align:left;
      font-family:'Geist',sans-serif;
    }
    .nav-item:hover{color:var(--text);background:var(--surface)}
    .nav-item.active{color:var(--text);background:var(--surface-2);border-color:var(--border-2)}
    .nav-item.active .nav-ic{color:var(--accent)}
    .nav-ic{font-size:1rem;flex-shrink:0;width:20px;text-align:center}
    .sidebar-bottom{padding:1rem 0.75rem;border-top:1px solid var(--border)}
    .user-card{display:flex;align-items:center;gap:0.75rem;padding:0.75rem;border-radius:12px;background:var(--surface);border:1px solid var(--border)}
    .user-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;font-size:0.875rem;font-weight:600;color:#fff}
    .user-name{font-size:0.825rem;font-weight:500}
    .user-role{font-size:0.7rem;color:var(--text-3)}

    /* ── MAIN ── */
    .main{margin-left:var(--sidebar-w);min-height:100vh;transition:margin-left 0.35s var(--ease)}

    /* ── TOPBAR ── */
    .topbar{
      position:sticky;top:0;z-index:50;
      background:color-mix(in srgb,var(--bg) 85%,transparent);
      backdrop-filter:blur(24px) saturate(180%);
      border-bottom:1px solid var(--border);
      padding:0.875rem 2rem;
      display:flex;align-items:center;justify-content:space-between;gap:1rem;
    }
    .topbar-left{display:flex;align-items:center;gap:1rem}
    .back-btn{
      display:flex;align-items:center;gap:0.5rem;
      padding:0.45rem 1rem;border-radius:8px;
      border:1px solid var(--border);background:var(--surface);
      color:var(--text-2);font-size:0.825rem;cursor:pointer;
      font-family:'Geist',sans-serif;transition:all 0.2s;text-decoration:none;
    }
    .back-btn:hover{border-color:var(--border-2);color:var(--text)}
    .topbar-right{display:flex;align-items:center;gap:0.75rem}
    .theme-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);font-size:0.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
    .theme-btn:hover{border-color:var(--border-2);color:var(--text)}
    .menu-btn{display:none;background:none;border:1px solid var(--border);color:var(--text);padding:0.5rem;border-radius:8px;cursor:pointer;font-size:1.1rem}

    /* ── CONTENT ── */
    .content{padding:2rem;max-width:1200px}

    /* ── LOADING / ERROR ── */
    .loading-state{display:flex;align-items:center;justify-content:center;padding:6rem;gap:0.75rem;color:var(--text-3);font-size:0.875rem}
    .spin{width:20px;height:20px;border-radius:50%;border:2px solid var(--border-2);border-top-color:var(--accent);animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── CASE HEADER CARD ── */
    .case-header{
      background:var(--surface);border:1px solid var(--border);
      border-radius:20px;padding:2rem;margin-bottom:1.5rem;
      position:relative;overflow:hidden;
      animation:fadeUp 0.5s var(--ease) both;
    }
    .case-header::before{
      content:'';position:absolute;top:0;left:0;right:0;height:3px;
      background:linear-gradient(90deg,var(--accent),var(--accent-2),transparent);
    }
    .case-header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap}
    .case-cat-icon{
      width:56px;height:56px;border-radius:14px;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      font-size:1.6rem;background:var(--bg-3);border:1px solid var(--border);
    }
    .case-title-wrap{flex:1;min-width:0}
    .case-title{
      font-family:'Instrument Serif',serif;
      font-size:1.75rem;line-height:1.25;margin-bottom:0.5rem;
    }
    .case-meta-row{display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap}
    .badge-status{font-size:0.7rem;padding:0.25rem 0.75rem;border-radius:100px;font-weight:500;letter-spacing:0.02em}
    .badge-status.draft{background:rgba(100,100,120,0.15);color:var(--text-3);border:1px solid rgba(100,100,120,0.2)}
    .badge-status.active{background:rgba(124,58,237,0.12);color:var(--accent-2);border:1px solid rgba(124,58,237,0.2)}
    .badge-status.notice_sent{background:rgba(251,191,36,0.12);color:var(--gold);border:1px solid rgba(251,191,36,0.2)}
    .badge-status.resolved{background:var(--green-g);color:var(--green);border:1px solid rgba(52,211,153,0.2)}
    .meta-chip{font-size:0.775rem;color:var(--text-3);display:flex;align-items:center;gap:0.3rem}
    .case-header-actions{display:flex;gap:0.75rem;flex-shrink:0;flex-wrap:wrap}
    .btn-primary{
      display:inline-flex;align-items:center;gap:0.5rem;
      background:var(--accent);color:#fff;border:none;
      padding:0.6rem 1.25rem;border-radius:10px;
      font-size:0.875rem;font-weight:500;cursor:pointer;
      font-family:'Geist',sans-serif;transition:all 0.25s;
      box-shadow:0 4px 16px var(--accent-g);text-decoration:none;
    }
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 28px var(--accent-g)}
    .btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none}
    .btn-secondary{
      display:inline-flex;align-items:center;gap:0.5rem;
      background:var(--surface);color:var(--text-2);
      border:1px solid var(--border);
      padding:0.6rem 1.25rem;border-radius:10px;
      font-size:0.875rem;font-weight:500;cursor:pointer;
      font-family:'Geist',sans-serif;transition:all 0.2s;
    }
    .btn-secondary:hover{border-color:var(--border-2);color:var(--text)}

    /* ── GRID ── */
    .detail-grid{display:grid;grid-template-columns:1fr 340px;gap:1.5rem}

    /* ── PANEL ── */
    .panel{
      background:var(--surface);border:1px solid var(--border);
      border-radius:18px;overflow:hidden;margin-bottom:1.5rem;
      animation:fadeUp 0.5s var(--ease) both;
    }
    .panel:nth-child(2){animation-delay:0.05s}
    .panel:nth-child(3){animation-delay:0.1s}
    .panel-head{
      display:flex;align-items:center;justify-content:space-between;
      padding:1.1rem 1.5rem;border-bottom:1px solid var(--border);
    }
    .panel-title{font-size:0.95rem;font-weight:600}
    .panel-sub{font-size:0.75rem;color:var(--text-3);margin-top:0.1rem}
    .panel-body{padding:1.5rem}

    /* ── AI SUMMARY ── */
    .ai-summary-box{
      background:linear-gradient(135deg,rgba(124,58,237,0.08),rgba(124,58,237,0.03));
      border:1px solid rgba(124,58,237,0.2);border-radius:12px;
      padding:1.25rem;
    }
    .ai-tag{
      display:inline-flex;align-items:center;gap:0.4rem;
      font-size:0.65rem;font-weight:600;letter-spacing:0.08em;
      text-transform:uppercase;color:var(--accent-2);
      background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.2);
      padding:0.2rem 0.6rem;border-radius:100px;margin-bottom:0.75rem;
    }
    .ai-summary-text{font-size:0.9rem;line-height:1.7;color:var(--text-2)}

    /* ── LAWS ── */
    .law-card{
      border:1px solid var(--border);border-radius:12px;
      padding:1.1rem 1.25rem;margin-bottom:0.75rem;
      transition:all 0.2s;background:var(--bg-2);
    }
    .law-card:hover{border-color:rgba(124,58,237,0.3);background:var(--bg-3)}
    .law-card:last-child{margin-bottom:0}
    .law-card-top{display:flex;align-items:flex-start;gap:0.875rem;margin-bottom:0.5rem}
    .law-num{
      width:26px;height:26px;border-radius:7px;flex-shrink:0;
      background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.2);
      display:flex;align-items:center;justify-content:center;
      font-size:0.7rem;font-weight:700;color:var(--accent-2);
    }
    .law-act{font-size:0.9rem;font-weight:600;line-height:1.3}
    .law-section{
      display:inline-block;font-size:0.7rem;font-weight:500;
      background:rgba(251,191,36,0.1);color:var(--gold);
      border:1px solid rgba(251,191,36,0.2);
      padding:0.1rem 0.5rem;border-radius:100px;margin-top:0.25rem;
    }
    .law-desc{font-size:0.825rem;color:var(--text-2);line-height:1.6;margin-top:0.5rem}

    /* ── DESCRIPTION ── */
    .desc-text{font-size:0.9rem;line-height:1.8;color:var(--text-2)}

    /* ── TIMELINE ── */
    .timeline{padding:0.5rem 0}
    .timeline-item{
      display:flex;gap:1rem;padding:0.75rem 0;
      position:relative;
    }
    .timeline-item:not(:last-child)::after{
      content:'';position:absolute;
      left:15px;top:44px;bottom:-4px;width:1px;
      background:var(--border);
    }
    .tl-dot{
      width:30px;height:30px;border-radius:50%;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      font-size:0.75rem;font-weight:700;
      border:2px solid var(--border);background:var(--bg-2);
      color:var(--text-3);transition:all 0.3s;z-index:1;
    }
    .tl-dot.done{background:var(--accent);border-color:var(--accent);color:#fff}
    .tl-dot.current{background:var(--bg-2);border-color:var(--accent);color:var(--accent);box-shadow:0 0 0 3px var(--accent-g)}
    .tl-content{flex:1;padding-top:0.3rem}
    .tl-step{font-size:0.875rem;font-weight:500;margin-bottom:0.2rem}
    .tl-desc{font-size:0.775rem;color:var(--text-3)}

    /* ── DOCUMENTS ── */
    .doc-item{
      display:flex;align-items:center;gap:0.75rem;
      padding:0.7rem 0;border-bottom:1px solid var(--border);
    }
    .doc-item:last-child{border-bottom:none}
    .doc-ic{
      width:32px;height:32px;border-radius:8px;flex-shrink:0;
      background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.15);
      display:flex;align-items:center;justify-content:center;font-size:0.875rem;
    }
    .doc-name{font-size:0.85rem;color:var(--text-2)}

    /* ── FORUM CARD ── */
    .forum-card{
      background:linear-gradient(135deg,rgba(52,211,153,0.08),rgba(52,211,153,0.03));
      border:1px solid rgba(52,211,153,0.2);border-radius:12px;padding:1.25rem;
    }
    .forum-label{font-size:0.7rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--green);margin-bottom:0.5rem}
    .forum-name{font-size:1rem;font-weight:600;margin-bottom:0.25rem}
    .forum-sub{font-size:0.8rem;color:var(--text-3)}

    /* ── CONFIDENCE ── */
    .confidence-wrap{margin-top:1rem}
    .conf-label{display:flex;justify-content:space-between;font-size:0.775rem;color:var(--text-3);margin-bottom:0.4rem}
    .conf-bar{height:6px;background:var(--border);border-radius:100px;overflow:hidden}
    .conf-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--accent),var(--accent-2));transition:width 1s var(--ease)}

    /* ── ANALYSE BTN STATE ── */
    .analyse-section{
      background:linear-gradient(135deg,rgba(124,58,237,0.1),rgba(124,58,237,0.04));
      border:1px dashed rgba(124,58,237,0.3);border-radius:12px;
      padding:1.5rem;text-align:center;
    }
    .analyse-icon{font-size:2rem;margin-bottom:0.75rem}
    .analyse-title{font-size:1rem;font-weight:600;margin-bottom:0.4rem}
    .analyse-sub{font-size:0.825rem;color:var(--text-3);margin-bottom:1.25rem}

    /* ── TOAST ── */
    .toast{position:fixed;bottom:2rem;right:2rem;z-index:999;padding:0.75rem 1.25rem;border-radius:12px;font-size:0.85rem;font-weight:500;opacity:0;transform:translateY(12px);transition:all 0.3s var(--ease);pointer-events:none;max-width:320px}
    .toast.show{opacity:1;transform:translateY(0)}
    .toast.success{background:rgba(52,211,153,0.15);color:var(--green);border:1px solid rgba(52,211,153,0.3)}
    .toast.error{background:rgba(248,113,113,0.15);color:var(--red);border:1px solid rgba(248,113,113,0.3)}
    .toast.info{background:rgba(124,58,237,0.15);color:var(--accent-2);border:1px solid rgba(124,58,237,0.3)}

    /* ── ANIMATIONS ── */
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

    /* ── RESPONSIVE ── */
    @media(max-width:900px){
      .sidebar{transform:translateX(-100%)}
      .sidebar.open{transform:translateX(0)}
      .main{margin-left:0}
      .menu-btn{display:flex}
      .detail-grid{grid-template-columns:1fr}
    }
    @media(max-width:600px){
      .content{padding:1rem}
      .case-title{font-size:1.35rem}
      .case-header-actions{width:100%}
      .btn-primary,.btn-secondary{flex:1;justify-content:center}
    }
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <a href="/" class="logo">NY<b>AA</b>I</a>
    <div class="logo-sub">Justice for Every Indian</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">
      <div class="nav-section-label">Main</div>
      <a class="nav-item" href="/dashboard/"><span class="nav-ic">🏠</span> Dashboard</a>
      <button class="nav-item" onclick="openNewCase()"><span class="nav-ic">⚖️</span> New Case</button>
      <a class="nav-item active" href="/dashboard/"><span class="nav-ic">📋</span> My Cases</a>
      <a class="nav-item" href="/dashboard/"><span class="nav-ic">📄</span> Legal Notices</a>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Resources</div>
      <button class="nav-item"><span class="nav-ic">📚</span> Indian Laws</button>
      <button class="nav-item"><span class="nav-ic">🏛️</span> Find Forum</button>
      <button class="nav-item"><span class="nav-ic">❓</span> How to Use</button>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Account</div>
      <button class="nav-item"><span class="nav-ic">👤</span> Profile</button>
      <button class="nav-item" onclick="doLogout()"><span class="nav-ic">🚪</span> Sign Out</button>
    </div>
  </nav>
  <div class="sidebar-bottom">
    <div class="user-card">
      <div class="user-avatar" id="sidebar-avatar">?</div>
      <div>
        <div class="user-name" id="sidebar-name">Loading...</div>
        <div class="user-role">NYAAI Member</div>
      </div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
      <a class="back-btn" href="/dashboard/">← Back to Dashboard</a>
    </div>
    <div class="topbar-right">
      <button class="theme-btn" id="themeBtn" title="Toggle theme">🌙</button>
    </div>
  </div>

  <div class="content" id="main-content">
    <div class="loading-state"><div class="spin"></div> Loading case...</div>
  </div>
</main>

<script>
  // ── THEME ──
  const html = document.documentElement;
  const tBtn = document.getElementById('themeBtn');
  const savedTheme = localStorage.getItem('nyaai-theme') || 'dark';
  applyTheme(savedTheme);
  function applyTheme(t) {
    html.setAttribute('data-theme', t);
    tBtn.textContent = t === 'dark' ? '☀️' : '🌙';
    localStorage.setItem('nyaai-theme', t);
  }
  tBtn.addEventListener('click', () => applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

  // ── AUTH ──
  const token = localStorage.getItem('access_token');
  const user  = JSON.parse(localStorage.getItem('user') || '{}');
  if (!token) { window.location.href = '/'; }
  else {
    const name = user.name || user.username || 'User';
    document.getElementById('sidebar-name').textContent = name;
    document.getElementById('sidebar-avatar').textContent = name.charAt(0).toUpperCase();
  }

  // ── GET CASE ID FROM URL (/case/2/) ──
  const caseId = window.location.pathname.split('/').filter(Boolean).pop();

  // ── TOAST ──
  let toastTimer;
  function showToast(msg, type = 'info') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
  }

  // ── ICONS ──
  const CAT_ICONS = {
    landlord:'🏠', shopping:'🛒', salary:'💰', bank:'🏦',
    medical:'🏥', telecom:'📱', service:'🔧', other:'⚖️'
  };

  function formatStatus(s) {
    return {draft:'Draft', active:'Active', notice_sent:'Notice Sent', resolved:'Resolved', closed:'Closed'}[s] || s;
  }
  function formatDate(d) {
    return new Date(d).toLocaleDateString('en-IN', {day:'numeric', month:'long', year:'numeric'});
  }

  // ── LOAD CASE ──
  async function loadCase() {
    try {
      const res = await fetch(`/api/cases/${caseId}/`, {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const d = await res.json();
      const c = d.case || d;
      renderCase(c);
    } catch(e) {
      document.getElementById('main-content').innerHTML = `
        <div class="loading-state" style="flex-direction:column;gap:1rem">
          <div style="font-size:2rem">⚠️</div>
          <div>Could not load case. <a href="/dashboard/" style="color:var(--accent)">Go back</a></div>
        </div>`;
    }
  }

  function renderCase(c) {
    const laws        = c.laws_violated     || [];
    const docs        = c.documents_needed  || [];
    const timeline    = c.timeline          || [];
    const isAnalysed  = c.is_analysed       || false;
    const confidence  = Math.round((c.confidence_score || 0) * 100);

    // Default timeline if not from API
    const defaultSteps = [
      {step:'Gather documents',     description:'Collect all relevant documents listed', order:1},
      {step:'Send legal notice',    description:'Download and send the generated notice', order:2},
      {step:'Wait for response',    description:'Give the other party 15 days to respond', order:3},
      {step:'File forum complaint', description:`File complaint at ${c.forum_type || 'appropriate forum'}`, order:4},
      {step:'Attend hearing',       description:'Attend the scheduled hearing date', order:5},
    ];
    const steps = timeline.length ? timeline : defaultSteps;

    // Determine current step based on status
    const stepMap = {draft:0, active:1, notice_sent:2, resolved:5};
    const currentStep = stepMap[c.status] ?? 0;

    document.getElementById('main-content').innerHTML = `

      <!-- CASE HEADER -->
      <div class="case-header">
        <div class="case-header-top">
          <div style="display:flex;gap:1rem;align-items:flex-start;flex:1;min-width:0">
            <div class="case-cat-icon">${CAT_ICONS[c.category] || '⚖️'}</div>
            <div class="case-title-wrap">
              <div class="case-title">${c.title}</div>
              <div class="case-meta-row">
                <span class="badge-status ${c.status}">${formatStatus(c.status)}</span>
                <span class="meta-chip">📅 Filed ${formatDate(c.created_at)}</span>
                ${c.category ? `<span class="meta-chip">🏷️ ${c.category}</span>` : ''}
                ${c.language ? `<span class="meta-chip">🌐 ${c.language.toUpperCase()}</span>` : ''}
              </div>
            </div>
          </div>
          <div class="case-header-actions">
            <button class="btn-secondary" onclick="runAnalysis()">🔄 Re-Analyse</button>
            <button class="btn-primary" id="dl-btn" onclick="downloadPDF()">📄 Download Notice</button>
          </div>
        </div>
      </div>

      <!-- GRID -->
      <div class="detail-grid">

        <!-- LEFT COLUMN -->
        <div>

          ${isAnalysed && c.ai_summary ? `
          <!-- AI SUMMARY -->
          <div class="panel">
            <div class="panel-head">
              <div>
                <div class="panel-title">Legal Analysis</div>
                <div class="panel-sub">AI-powered assessment of your case</div>
              </div>
            </div>
            <div class="panel-body">
              <div class="ai-summary-box">
                <div class="ai-tag">✨ AI Analysis</div>
                <div class="ai-summary-text">${c.ai_summary}</div>
              </div>
              ${confidence > 0 ? `
              <div class="confidence-wrap">
                <div class="conf-label">
                  <span>AI Confidence</span>
                  <span>${confidence}%</span>
                </div>
                <div class="conf-bar">
                  <div class="conf-fill" id="conf-fill" style="width:0%"></div>
                </div>
              </div>` : ''}
            </div>
          </div>` : ''}

          ${!isAnalysed ? `
          <!-- NOT ANALYSED YET -->
          <div class="panel">
            <div class="panel-body">
              <div class="analyse-section">
                <div class="analyse-icon">🤖</div>
                <div class="analyse-title">Case not analysed yet</div>
                <div class="analyse-sub">Run AI analysis to identify applicable laws and generate your legal notice PDF.</div>
                <button class="btn-primary" onclick="runAnalysis()">⚡ Analyse with AI Now</button>
              </div>
            </div>
          </div>` : ''}

          <!-- APPLICABLE LAWS -->
          ${laws.length > 0 ? `
          <div class="panel">
            <div class="panel-head">
              <div>
                <div class="panel-title">Applicable Laws</div>
                <div class="panel-sub">${laws.length} law${laws.length > 1 ? 's' : ''} identified by AI</div>
              </div>
            </div>
            <div class="panel-body">
              ${laws.map((law, i) => `
                <div class="law-card">
                  <div class="law-card-top">
                    <div class="law-num">${i + 1}</div>
                    <div>
                      <div class="law-act">${law.act || 'Unknown Act'}</div>
                      ${law.section ? `<span class="law-section">Section ${law.section}</span>` : ''}
                    </div>
                  </div>
                  ${law.description ? `<div class="law-desc">${law.description}</div>` : ''}
                </div>
              `).join('')}
            </div>
          </div>` : ''}

          <!-- DESCRIPTION -->
          <div class="panel">
            <div class="panel-head">
              <div class="panel-title">Problem Description</div>
            </div>
            <div class="panel-body">
              <div class="desc-text">${c.description}</div>
            </div>
          </div>

        </div>

        <!-- RIGHT COLUMN -->
        <div>

          <!-- CASE TIMELINE -->
          <div class="panel">
            <div class="panel-head">
              <div>
                <div class="panel-title">Case Timeline</div>
                <div class="panel-sub">Step ${Math.min(currentStep + 1, steps.length)} of ${steps.length}</div>
              </div>
            </div>
            <div class="panel-body" style="padding:1rem 1.5rem">
              <div class="timeline">
                ${steps.map((s, i) => {
                  const isDone    = i < currentStep;
                  const isCurrent = i === currentStep;
                  return `
                  <div class="timeline-item">
                    <div class="tl-dot ${isDone ? 'done' : isCurrent ? 'current' : ''}">
                      ${isDone ? '✓' : i + 1}
                    </div>
                    <div class="tl-content">
                      <div class="tl-step" style="color:${isCurrent ? 'var(--accent-2)' : isDone ? 'var(--text)' : 'var(--text-3)'}">${s.step}</div>
                      <div class="tl-desc">${s.description}</div>
                    </div>
                  </div>`;
                }).join('')}
              </div>
            </div>
          </div>

          <!-- FORUM -->
          ${c.forum_type ? `
          <div class="panel">
            <div class="panel-head">
              <div class="panel-title">Where to File</div>
            </div>
            <div class="panel-body">
              <div class="forum-card">
                <div class="forum-label">📍 Recommended Forum</div>
                <div class="forum-name">${c.forum_type}</div>
                <div class="forum-sub">This is the appropriate authority to approach for your case.</div>
              </div>
            </div>
          </div>` : ''}

          <!-- DOCUMENTS NEEDED -->
          ${docs.length > 0 ? `
          <div class="panel">
            <div class="panel-head">
              <div>
                <div class="panel-title">Documents Needed</div>
                <div class="panel-sub">Collect before filing</div>
              </div>
            </div>
            <div class="panel-body" style="padding:1rem 1.5rem">
              ${docs.map(d => `
                <div class="doc-item">
                  <div class="doc-ic">📎</div>
                  <div class="doc-name">${d}</div>
                </div>
              `).join('')}
            </div>
          </div>` : ''}

        </div>
      </div>
    `;

    // Animate confidence bar
    if (confidence > 0) {
      setTimeout(() => {
        const fill = document.getElementById('conf-fill');
        if (fill) fill.style.width = confidence + '%';
      }, 300);
    }
  }

  // ── DOWNLOAD PDF ──
  async function downloadPDF() {
    const btn = document.getElementById('dl-btn');
    if (!btn) return;
    btn.disabled = true;
    btn.textContent = '⏳ Generating...';
    showToast('Generating Legal Notice PDF...', 'info');

    try {
      const res = await fetch(`/api/documents/download/${caseId}/`, {
        headers: { 'Authorization': 'Bearer ' + token }
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        showToast('❌ ' + (err.error || 'PDF generation failed.'), 'error');
        return;
      }

      const blob = await res.blob();
      const url  = window.URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = `legal_notice_case_${caseId}.pdf`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      window.URL.revokeObjectURL(url);
      showToast('✅ Legal Notice PDF downloaded!', 'success');
    } catch(e) {
      showToast('❌ Could not connect to server.', 'error');
    } finally {
      btn.disabled  = false;
      btn.textContent = '📄 Download Notice';
    }
  }

  // ── RUN ANALYSIS ──
  async function runAnalysis() {
    showToast('⚡ Running AI analysis...', 'info');
    try {
      const res = await fetch(`/api/cases/${caseId}/analyse/`, {
        method:  'POST',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }
      });
      const d = await res.json();
      if (d.success) {
        showToast('✅ Analysis complete!', 'success');
        setTimeout(loadCase, 800);
      } else {
        showToast('❌ ' + (d.message || 'Analysis failed.'), 'error');
      }
    } catch(e) {
      showToast('❌ Could not connect to server.', 'error');
    }
  }

  // ── LOGOUT ──
  function doLogout() {
    const refresh = localStorage.getItem('refresh_token');
    if (refresh) {
      fetch('/api/auth/logout/', {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
        body:JSON.stringify({refresh})
      }).catch(()=>{});
    }
    localStorage.clear();
    window.location.href = '/';
  }

  // ── INIT ──
  loadCase();
</script>
</body>
</html>
